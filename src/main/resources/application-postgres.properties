# ============================================================
#  ملف إعداد بيئة الإنتاج - PostgreSQL
#  يُبنى رابط الاتصال من متغيّرات البيئة التي يوفّرها Render تلقائيًا
#  (DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASS)، أو من SPRING_DATASOURCE_URL مباشرة.
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meetingsdb}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASS:postgres}}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
