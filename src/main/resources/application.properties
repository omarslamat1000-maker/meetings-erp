# ============================================================
#  منصة متابعة منظومة اجتماعات نائب الأمين
#  الإعداد الافتراضي: قاعدة بيانات H2 للتشغيل المحلي والتجربة
# ============================================================
spring.application.name=meetings-erp
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ---------- قاعدة البيانات H2 (ملف على القرص حتى تبقى البيانات) ----------
spring.datasource.url=jdbc:h2:file:./data/meetingsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# لوحة H2 للاطلاع على قاعدة البيانات: /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
# مفتوح أثناء العرض للسماح بتحميل العلاقات الكسولة داخل قوالب Thymeleaf
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# ---------- رفع الملفات (Excel) ----------
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ---------- Thymeleaf ----------
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ---------- تسجيل الأحداث ----------
logging.level.sa.gov.madinah=INFO

# ============================================================
#  خيار الإنتاج: PostgreSQL أو MySQL
#  فعّل عبر:  --spring.profiles.active=postgres  أو  mysql
# ============================================================
